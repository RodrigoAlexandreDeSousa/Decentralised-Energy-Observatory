<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100" fill="none">
  <!-- Glifo: sol (energia solar) — disco + raios geométricos -->
  <g transform="translate(44,50)">
    <!-- raios -->
    <g stroke="#E8B923" stroke-width="2.4" stroke-linecap="round">
      <line x1="17" y1="0"    x2="26" y2="0"/>
      <line x1="-17" y1="0"   x2="-26" y2="0"/>
      <line x1="0" y1="17"    x2="0" y2="26"/>
      <line x1="0" y1="-17"   x2="0" y2="-26"/>
      <line x1="12" y1="12"   x2="18.4" y2="18.4"/>
      <line x1="-12" y1="12"  x2="-18.4" y2="18.4"/>
      <line x1="12" y1="-12"  x2="18.4" y2="-18.4"/>
      <line x1="-12" y1="-12" x2="-18.4" y2="-18.4"/>
    </g>
    <!-- disco solar -->
    <circle cx="0" cy="0" r="12" fill="#E8B923"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#0A0A0B" stroke-width="0"/>
  </g>

  <!-- Wordmark -->
  <text x="100" y="50" font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="30" font-weight="700" fill="#F4F4F5" letter-spacing="0.3">OBSERVATÓRIO</text>
  <text x="102" y="78" font-family="Inter, 'Segoe UI', Arial, sans-serif"
        font-size="17" font-weight="600" fill="#E8B923" letter-spacing="4">ENERGÉTICO</text>
</svg>
